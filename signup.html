<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboard AlertaIQ</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body style="background:#020617;color:white;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="width:400px;padding:20px;background:#0f172a;border-radius:20px">

<h2>Create Account</h2>

<form id="signupForm">

<input id="fullName" placeholder="Name" style="width:100%;margin:10px 0;padding:10px"><br>

<input id="email" placeholder="Email" style="width:100%;margin:10px 0;padding:10px"><br>

<input id="phone" placeholder="Phone" style="width:100%;margin:10px 0;padding:10px"><br>

<input id="password" type="password" placeholder="Password" style="width:100%;margin:10px 0;padding:10px"><br>

<button id="submitBtn" type="submit" style="width:100%;padding:10px;background:blue;color:white">
Create Account
</button>

</form>

<p id="msg"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
  authDomain: "bizgrow-a23c0.firebaseapp.com",
  projectId: "bizgrow-a23c0",
  storageBucket: "bizgrow-a23c0.firebasestorage.app",
  messagingSenderId: "939506450920",
  appId: "1:939506450920:web:76e5faf1fc9caf379c245d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("signupForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const fullName = document.getElementById("fullName").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;

  if (phone.length !== 10) {
    msg.innerText = "Phone must be 10 digits";
    return;
  }

  try {
    // 1. Create Auth user
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // 2. Save Firestore data (FIXED PATH)
    await setDoc(doc(db, "users", user.uid), {
      name: fullName,
      email: email,
      phone: "+91" + phone,
      createdAt: new Date().toISOString()
    });

    msg.innerText = "Account created successfully!";
    msg.style.color = "lightgreen";

  } catch (error) {
    msg.innerText = error.message;
    msg.style.color = "red";
  }
});

</script>

</body>
</html>
