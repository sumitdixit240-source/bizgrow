<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join BizGrow | Create Your Autonomous Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ai-gradient {
            background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
        }

        .neural-bg {
            background-image: radial-gradient(#10b981 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.4;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .success-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="p-4">
    <div class="neural-bg"></div>

    <!-- Home Button -->
    <a href="index.html" class="fixed top-6 left-6 flex items-center gap-2 bg-white px-5 py-2.5 rounded-2xl shadow-sm border border-slate-100 font-bold text-slate-700 hover:bg-slate-50 transition-all z-50">
        <i class="fas fa-home text-sm text-emerald-600"></i>
        <span>Home</span>
    </a>

    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-8 md:p-10 animate-slide-up">
        <div class="text-center mb-10">
            <div class="w-16 h-16 ai-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-200 mx-auto mb-6">
                <i class="fas fa-brain text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Join BIZGROW</h1>
            <p class="text-slate-500 font-medium">Start your journey with autonomous intelligence</p>
        </div>

        <form id="signupForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Full Name</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="fullName" required placeholder="John Doe" 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Work Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="email" id="email" required placeholder="john@company.com" 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Create Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full ai-gradient text-white py-4 rounded-2xl font-bold text-lg hover:brightness-110 transition-all shadow-xl shadow-emerald-100 mt-4 flex items-center justify-center gap-2">
                <span>Create My Account</span>
                <i class="fas fa-arrow-right text-sm"></i>
            </button>
        </form>

        <p class="text-center mt-8 text-slate-500 text-sm">
            Already have an account? 
            <a href="login.html" class="text-emerald-600 font-bold hover:underline">Log in</a>
        </p>
    </div>

    <!-- Success Message Modal with Timer -->
    <div id="successModal" class="success-modal px-4">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center shadow-2xl animate-slide-up">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 mb-4">Success!</h2>
            <p class="text-slate-600 mb-6 leading-relaxed">
                We are creating your account. Please wait...
            </p>
            <div class="flex flex-col items-center gap-4">
                <div class="text-5xl font-black text-emerald-600" id="redirectTimer">5</div>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Redirecting to Login Page</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
            authDomain: "bizgrow-a23c0.firebaseapp.com",
            projectId: "bizgrow-a23c0",
            storageBucket: "bizgrow-a23c0.firebasestorage.app",
            messagingSenderId: "939506450920",
            appId: "1:939506450920:web:76e5faf1fc9caf379c245d",
            measurementId: "G-WLZYCP312V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bizgrow-prod';

        const form = document.getElementById("signupForm");
        const submitBtn = document.getElementById("submitBtn");
        const modal = document.getElementById('successModal');
        const timerEl = document.getElementById('redirectTimer');

        async function withRetry(fn, retries = 5, delay = 1000) {
            try {
                return await fn();
            } catch (err) {
                if (retries <= 0) throw err;
                await new Promise(resolve => setTimeout(resolve, delay));
                return withRetry(fn, retries - 1, delay * 2);
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("fullName").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> Initializing Neural Space...';

            try {
                // 1. Create the Auth User
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Save User Data to Firestore (following Rule 1)
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                
                await withRetry(() => setDoc(userDocRef, {
                    fullName: name,
                    email: email,
                    createdAt: new Date().toISOString(),
                    uid: user.uid,
                    appId: appId
                }));

                // 3. UI Success & 5-second Timer
                modal.style.display = 'flex';
                let timeLeft = 5;
                
                const countdown = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        window.location.href = 'login.html'; // Move to login page
                    }
                }, 1000);

            } catch (err) {
                console.error("Signup Error:", err);
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Create My Account';
                
                const errorDisplay = document.createElement('p');
                errorDisplay.className = 'text-red-500 text-xs mt-4 text-center font-bold animate-slide-up';
                errorDisplay.innerText = err.message || 'Signup failed. Please check your network connection.';
                
                const existing = document.querySelector('.text-red-500');
                if (existing) existing.remove();
                form.appendChild(errorDisplay);
                setTimeout(() => errorDisplay.remove(), 5000);
            }
        });
    </script>
</body>
</html>
