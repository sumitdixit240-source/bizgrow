<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboard AlertaIQ | AI Expiry & Compliance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .neural-bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 40%),
                #020617;
        }

        .grid-overlay {
            position: fixed; inset: 0; z-index: -1;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, black, transparent);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .loader {
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 18px; height: 18px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .float { animation: float 3.1s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* Catchy Back Button style */
        .catchy-back {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .catchy-back:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateX(-4px);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 py-12">
    <div class="neural-bg"></div>
    <div class="grid-overlay"></div>

    <div class="max-w-md w-full">
        <!-- New Medium Sized Catchy Home Button -->
        <div class="mb-8 flex justify-start">
            <button onclick="window.location.href='index.html'" class="catchy-back px-5 py-3 rounded-2xl flex items-center gap-3 text-slate-400 font-bold text-xs uppercase tracking-widest group">
                <div class="w-8 h-8 rounded-full bg-slate-800/50 flex items-center justify-center group-hover:bg-blue-600/20 transition-colors">
                    <i class="fas fa-chevron-left group-hover:-translate-x-0.5 transition-transform"></i>
                </div>
                Return Home
            </button>
        </div>

        <!-- MAIN SIGNUP INTERFACE -->
        <div id="onboarding-form" class="glass-card rounded-[2.5rem] p-8 md:p-10 slide-up">
            <header class="text-center mb-8">
                <div class="flex items-center justify-center gap-2 mb-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
                        <i class="fas fa-fingerprint text-white"></i>
                    </div>
                    <h1 class="text-2xl font-black tracking-tighter">Alerta<span class="text-blue-500">IQ</span></h1>
                </div>
                <h2 class="text-xl font-bold text-white mb-1">Create Your Identity</h2>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Deployment Protocol Alpha</p>
            </header>

            <form id="signupForm" class="space-y-4">
                <!-- Full Name -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Entity Name</label>
                    <div class="relative">
                        <i class="fas fa-signature absolute left-5 top-1/2 -translate-y-1/2 text-slate-600 text-xs"></i>
                        <input type="text" id="fullName" required placeholder="John Doe" 
                            class="input-field w-full rounded-2xl py-4 pl-12 pr-6 outline-none font-bold text-white placeholder:text-slate-700">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Communication Protocol (Email)</label>
                    <div class="relative">
                        <i class="fas fa-at absolute left-5 top-1/2 -translate-y-1/2 text-slate-600 text-xs"></i>
                        <input type="email" id="email" required placeholder="contact@alertaiq.io" 
                            class="input-field w-full rounded-2xl py-4 pl-12 pr-6 outline-none font-bold text-white placeholder:text-slate-700">
                    </div>
                </div>

                <!-- Mobile -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Secure Mobile Vector</label>
                    <div class="relative flex items-center">
                        <div class="absolute left-5 text-blue-500 font-black text-xs pointer-events-none">+91</div>
                        <input type="number" id="phone" required placeholder="00000 00000" 
                            class="input-field w-full rounded-2xl py-4 pl-14 pr-6 outline-none font-bold text-white placeholder:text-slate-700 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                    </div>
                    <p id="phoneError" class="hidden text-[9px] font-bold text-rose-500 mt-2 ml-1 uppercase tracking-tighter">
                        <i class="fas fa-circle-exclamation mr-1"></i> Mobile vector must be exactly 10 digits.
                    </p>
                </div>

                <!-- Strategic Password -->
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Strategic Access Code</label>
                    <div class="relative">
                        <i class="fas fa-shield-alt absolute left-5 top-1/2 -translate-y-1/2 text-slate-600 text-xs"></i>
                        <input type="password" id="password" required placeholder="Minimum 8 characters" 
                            class="input-field w-full rounded-2xl py-4 pl-12 pr-6 outline-none font-bold text-white placeholder:text-slate-700">
                    </div>
                </div>

                <!-- Error Notification -->
                <div id="errorMessage" class="hidden p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-[10px] font-bold flex items-center gap-3">
                    <i class="fas fa-triangle-exclamation"></i>
                    <span id="errorText">Validation Error</span>
                </div>

                <div class="pt-2">
                    <button type="submit" id="submitBtn" class="btn-primary w-full text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-[11px] flex items-center justify-center gap-3">
                        Initialize Deployment
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center">
                <p class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-600">AlertaIQ SaaS &copy; 2024</p>
            </div>
        </div>
    </div>

    <!-- SUCCESS MODAL (UNCHANGED) -->
    <div id="success-screen" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/95 backdrop-blur-3xl">
        <div class="max-w-md w-full text-center slide-up">
            <div class="relative w-48 h-48 mx-auto mb-6 float">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                    <rect x="60" y="70" width="80" height="70" rx="20" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="4"/>
                    <rect x="75" y="85" width="50" height="25" rx="8" fill="#1e293b"/>
                    <circle cx="90" cy="97" r="4" fill="#34d399">
                        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="110" cy="97" r="4" fill="#34d399">
                        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
                    </circle>
                    <path d="M100 40 L100 70" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="100" cy="35" r="6" fill="#60a5fa">
                        <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite" />
                    </circle>
                </svg>
                <div class="absolute top-0 right-0 bg-white text-blue-600 px-4 py-2 rounded-2xl font-black text-[10px] shadow-xl rotate-12 uppercase tracking-widest border-2 border-blue-100">
                    Perfect Score!
                </div>
            </div>

            <h2 class="text-4xl font-black text-white mb-4 tracking-tight">Account Synthesized!</h2>
            <p class="text-slate-400 font-medium text-sm px-6 mb-10 leading-relaxed italic">
                "Outstanding! Your profile is now live in the AlertaIQ neural network."
            </p>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="window.location.href='index.html'" class="btn-secondary py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest text-white">
                    <i class="fas fa-arrow-left mr-2"></i> Home
                </button>
                <button onclick="window.location.href='login_ui.html'" class="btn-primary py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest text-white">
                    Log In <i class="fas fa-sign-in-alt ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
            authDomain: "bizgrow-a23c0.firebaseapp.com",
            projectId: "bizgrow-a23c0",
            storageBucket: "bizgrow-a23c0.firebasestorage.app",
            messagingSenderId: "939506450920",
            appId: "1:939506450920:web:76e5faf1fc9caf379c245d",
            measurementId: "G-WLZYCP312V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById("signupForm");
        const submitBtn = document.getElementById("submitBtn");
        const phoneInput = document.getElementById("phone");
        const phoneError = document.getElementById("phoneError");
        const onboardingForm = document.getElementById("onboarding-form");
        const successScreen = document.getElementById("success-screen");
        const errorContainer = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");

        phoneInput.addEventListener('input', () => {
            const val = phoneInput.value;
            if(val.length > 0 && val.length !== 10) {
                phoneError.classList.remove('hidden');
                phoneInput.classList.add('border-rose-500');
            } else {
                phoneError.classList.add('hidden');
                phoneInput.classList.remove('border-rose-500');
            }
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const fullName = document.getElementById("fullName").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;

            if (phone.length !== 10) {
                errorText.innerText = "Mobile vector must be precisely 10 digits.";
                errorContainer.classList.remove("hidden");
                return;
            }

            errorContainer.classList.add("hidden");
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> Deploying Node...';

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                const user = cred.user;
                await setDoc(doc(db, "users", user.uid), {
                    identityName: fullName,
                    email: email,
                    fullMobile: `+91${phone}`,
                    status: "ACTIVE",
                    deployedAt: new Date().toISOString()
                });
                onboardingForm.classList.add('hidden');
                successScreen.classList.remove('hidden');
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = "Initialize Deployment";
                errorContainer.classList.remove("hidden");
                errorText.innerText = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>
