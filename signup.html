<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlertaIQ | Modern Onboarding</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #020617;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            overflow-x: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Abstract Animated Background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(2, 6, 23, 1) 0%, transparent 100%);
        }

        .floating-shape {
            position: absolute;
            background: linear-gradient(45deg, var(--primary), #6366f1);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.2;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: rgba(15, 23, 42, 0.9);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-gradient:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-gradient:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Floating Logo Animation */
        .company-logo {
            animation: bounce-gentle 4s infinite ease-in-out;
        }

        @keyframes bounce-gentle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>

<body class="p-6">

    <div class="bg-mesh"></div>
    <div class="floating-shape w-64 h-64 top-0 left-0"></div>
    <div class="floating-shape w-96 h-96 bottom-0 right-0" style="animation-delay: -5s;"></div>

    <!-- SUCCESS POPUP -->
    <div id="successPopup" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-xl flex items-center justify-center z-[999] p-4">
        <div class="bg-slate-900 p-10 rounded-3xl text-center w-full max-w-sm border border-white/10 shadow-2xl transform transition-all scale-100">
            <div class="w-20 h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 border border-green-500/30">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-3xl font-bold text-white mb-2">Welcome Aboard!</h2>
            <p class="text-slate-400 mb-8 leading-relaxed">
                Your AlertaIQ account has been created successfully. Ready to dive in?
            </p>
            <button onclick="goToLogin()" 
                class="w-full btn-gradient text-white font-bold py-4 rounded-2xl">
                Proceed to Login
            </button>
        </div>
    </div>

    <div class="w-full max-w-md relative">
        
        <!-- Floating Logo/Company Name -->
        <div class="text-center mb-10 company-logo">
            <div class="inline-flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
                    <i class="fas fa-bolt text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">
                    Alerta<span class="text-blue-500">IQ</span>
                </h1>
            </div>
            <p class="text-slate-500 mt-2 text-sm font-medium uppercase tracking-widest">Intelligent Monitoring</p>
        </div>

        <!-- FORM CARD -->
        <div class="glass-card p-8 md:p-10 rounded-[2.5rem] relative overflow-hidden">
            <!-- Decorative inner light -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 blur-3xl rounded-full -mr-16 -mt-16"></div>

            <div class="relative z-10">
                <h2 class="text-2xl font-bold text-white mb-1">Create Account</h2>
                <p class="text-slate-400 text-sm mb-8">Join the AlertaIQ network today.</p>

                <form id="signupForm" class="space-y-5">
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input id="fullName" type="text" placeholder="Full Name" required
                            class="input-field w-full pl-11 pr-4 py-4 rounded-2xl bg-slate-900/50 text-white placeholder:text-slate-600 outline-none">
                    </div>

                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input id="email" type="email" placeholder="Email Address" required
                            class="input-field w-full pl-11 pr-4 py-4 rounded-2xl bg-slate-900/50 text-white placeholder:text-slate-600 outline-none">
                    </div>

                    <div class="relative">
                        <i class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input id="phone" type="tel" placeholder="Phone (10 digits)" required
                            class="input-field w-full pl-11 pr-4 py-4 rounded-2xl bg-slate-900/50 text-white placeholder:text-slate-600 outline-none">
                    </div>

                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input id="password" type="password" placeholder="Password" required
                            class="input-field w-full pl-11 pr-4 py-4 rounded-2xl bg-slate-900/50 text-white placeholder:text-slate-600 outline-none">
                    </div>

                    <div class="pt-2">
                        <button id="submitBtn" type="submit"
                            class="w-full btn-gradient text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 group">
                            <span>Create Account</span>
                            <i class="fas fa-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </div>
                </form>

                <div id="msg" class="text-center mt-6 text-sm min-h-[20px] font-medium"></div>

                <div class="mt-8 text-center">
                    <p class="text-slate-500 text-sm">
                        Already have an account? 
                        <a href="login.html" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">Sign In</a>
                    </p>
                </div>
            </div>
        </div>

        <p class="text-center text-slate-600 text-xs mt-8">
            &copy; 2024 AlertaIQ Technologies. All rights reserved.
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
            authDomain: "bizgrow-a23c0.firebaseapp.com",
            projectId: "bizgrow-a23c0",
            storageBucket: "bizgrow-a23c0.firebasestorage.app",
            messagingSenderId: "939506450920",
            appId: "1:939506450920:web:76e5faf1fc9caf379c245d",
            measurementId: "G-WLZYCP312V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById("signupForm");
        const msg = document.getElementById("msg");
        const btn = document.getElementById("submitBtn");
        const popup = document.getElementById("successPopup");

        function showPopup() {
            popup.classList.remove("hidden");
            // Smooth entrance animation could be handled by classes, but simple hidden toggle for now
        }

        window.goToLogin = function () {
            window.location.href = "login.html";
        };

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            msg.innerText = "";

            const fullName = document.getElementById("fullName").value.trim();
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value;

            if (phone.length !== 10) {
                msg.innerText = "Please enter a valid 10-digit phone number";
                msg.className = "text-center mt-6 text-sm font-medium text-red-400";
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> Initializing...`;

                // 1. Create Auth user
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCred.user;

                btn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> Securing Profile...`;

                // 2. Firestore (SAFE STRUCTURE)
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: fullName,
                    email: email,
                    phone: "+91 " + phone,
                    createdAt: new Date().toISOString(),
                    role: "user"
                });

                // 3. SHOW SUCCESS POPUP
                showPopup();

                form.reset();
                btn.disabled = false;
                btn.innerHTML = `<span>Create Account</span><i class="fas fa-arrow-right text-sm"></i>`;

            } catch (error) {
                console.error(error);
                let errorMessage = "An error occurred. Please try again.";
                
                if (error.code === 'auth/email-already-in-use') errorMessage = "This email is already registered.";
                if (error.code === 'auth/weak-password') errorMessage = "Password should be at least 6 characters.";
                
                msg.innerText = errorMessage;
                msg.className = "text-center mt-6 text-sm font-medium text-red-400";

                btn.disabled = false;
                btn.innerHTML = `<span>Create Account</span><i class="fas fa-arrow-right text-sm"></i>`;
            }
        });
    </script>

</body>
</html>
