<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | BizGrow</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body {
    font-family: sans-serif;
    background: #f8fafc;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<!-- FORM -->
<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

    <form id="signupForm" class="space-y-4">

        <input type="text" id="fullName" placeholder="Full Name" required
        class="w-full p-3 border rounded-xl">

        <input type="email" id="email" placeholder="Email" required
        class="w-full p-3 border rounded-xl">

        <input type="password" id="password" placeholder="Password" required
        class="w-full p-3 border rounded-xl">

        <button id="submitBtn"
        class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">
            Create Account
        </button>

    </form>

    <p class="text-center mt-4 text-sm">
        Already have an account?
        <a href="login.html" class="text-emerald-600 font-bold">Login</a>
    </p>

</div>

<!-- SUCCESS MODAL -->
<div id="successModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

    <div class="bg-white p-6 rounded-xl text-center w-80 relative">

        <button onclick="closeModal()" class="absolute top-3 right-3 text-gray-400">
            <i class="fas fa-times"></i>
        </button>

        <div class="text-green-500 text-3xl mb-3">
            <i class="fas fa-check-circle"></i>
        </div>

        <h3 class="font-bold text-lg">Account Created</h3>
        <p class="text-sm text-gray-500 mt-2">
            Your account has been successfully created.
        </p>

    </div>

</div>

<!-- SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
    authDomain: "bizgrow-a23c0.firebaseapp.com",
    projectId: "bizgrow-a23c0",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("signupForm");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("fullName").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    btn.disabled = true;
    btn.innerText = "Creating...";

    try {

        // CREATE USER
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCred.user;

        // SAVE TO FIRESTORE (IMPORTANT PATH)
        await setDoc(
            doc(db, "artifacts", "bizgrow-prod", "users", user.uid, "profile", "data"),
            {
                fullName: name,
                email: email,
                uid: user.uid,
                createdAt: new Date().toISOString()
            }
        );

        // SHOW POPUP
        document.getElementById("successModal").classList.remove("hidden");

        form.reset();

    } catch (err) {

        alert(err.message);
        btn.disabled = false;
        btn.innerText = "Create Account";

    }

});

// CLOSE MODAL
window.closeModal = () => {
    document.getElementById("successModal").classList.add("hidden");
};

</script>

</body>
</html>
