<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlertaIQ Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #020617;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), radial-gradient(circle at bottom left, #0f172a, transparent);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-900/20">
                <i class="fas fa-shield-halved text-3xl text-white"></i>
            </div>
            <h2 class="text-3xl font-bold text-white tracking-tight">AlertaIQ</h2>
            <p class="text-slate-400 mt-2">Intelligence for a safer workspace</p>
        </div>

        <form id="signupForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 ml-1">Full Name</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input id="fullName" type="text" placeholder="John Doe" required
                        class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 pl-10 pr-4 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 ml-1">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input id="email" type="email" placeholder="name@company.com" required
                        class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 pl-10 pr-4 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 ml-1">Phone Number</label>
                <div class="relative">
                    <i class="fas fa-phone absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input id="phone" type="tel" placeholder="10-digit mobile" required
                        class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 pl-10 pr-4 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 ml-1">Secure Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input id="password" type="password" placeholder="••••••••" required
                        class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 pl-10 pr-4 transition-all">
                </div>
            </div>

            <button id="submitBtn" type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all active:scale-[0.98] mt-4">
                Create Account
            </button>
        </form>

        <div id="msgContainer" class="hidden mt-6 p-4 rounded-xl text-center text-sm font-medium">
            <span id="msg"></span>
        </div>
        
        <p class="text-center text-slate-500 text-xs mt-8">
            By joining, you agree to our Terms of Service and Privacy Policy.
        </p>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInAnonymously, 
    signInWithCustomToken,
    onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { 
    getFirestore, 
    doc, 
    setDoc 
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

// Environment-provided Globals
const firebaseConfig = JSON.parse(__firebase_config);
const appId = typeof __app_id !== 'undefined' ? __app_id : 'alerta-iq-default';

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

const form = document.getElementById("signupForm");
const msgContainer = document.getElementById("msgContainer");
const msg = document.getElementById("msg");
const submitBtn = document.getElementById("submitBtn");

// UI Helpers
function showMessage(text, isError = true) {
    msgContainer.classList.remove('hidden', 'bg-red-900/20', 'text-red-400', 'bg-emerald-900/20', 'text-emerald-400');
    msgContainer.classList.add(isError ? 'bg-red-900/20' : 'bg-emerald-900/20');
    msgContainer.classList.add(isError ? 'text-red-400' : 'text-emerald-400');
    msg.innerText = text;
}

// MANDATORY RULE 3: Auth Before Queries
const initAuth = async () => {
    try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    } catch (error) {
        console.error("Auth initialization failed:", error);
    }
};

onAuthStateChanged(auth, (user) => {
    currentUser = user;
});

// Handle Signup
form.addEventListener("submit", async (e) => {
    e.preventDefault();
    
    // Ensure auth is ready
    if (!currentUser) {
        showMessage("Initial connection establishing... please try again in a moment.");
        await initAuth();
        return;
    }

    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;

    // Validation
    if (phone.length !== 10 || isNaN(phone)) {
        return showMessage("Please enter a valid 10-digit mobile number.");
    }
    if (password.length < 6) {
        return showMessage("Password must be at least 6 characters long.");
    }

    submitBtn.disabled = true;
    submitBtn.innerText = "Creating Account...";

    try {
        // 1. Create Auth User
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const newUser = userCred.user;

        // 2. MANDATORY RULE 1: Correct Firestore Path Structure
        // Format: /artifacts/{appId}/users/{userId}/{collectionName}/{docId}
        const userRef = doc(db, 'artifacts', appId, 'users', newUser.uid, 'profile', 'data');
        
        await setDoc(userRef, {
            uid: newUser.uid,
            displayName: fullName,
            email: email,
            phone: "+91 " + phone,
            role: "user",
            onboardedAt: new Date().toISOString(),
            appContext: appId
        });

        showMessage("Welcome aboard! Your account is ready.", false);
        form.reset();
        submitBtn.innerText = "Success!";
        
    } catch (error) {
        console.error("Signup error:", error);
        let errorText = "Registration failed. Please check your details.";

        if (error.code === "auth/email-already-in-use") errorText = "This email is already registered.";
        if (error.code === "auth/invalid-email") errorText = "Invalid email format.";
        if (error.code === "auth/weak-password") errorText = "Password is too weak.";
        
        showMessage(errorText);
        submitBtn.disabled = false;
        submitBtn.innerText = "Create Account";
    }
});

// Start auth on load
window.onload = initAuth;

</script>
</body>
</html>
