<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join BizGrow | Create Your Autonomous Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ai-gradient {
            background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
        }

        .neural-bg {
            background-image: radial-gradient(#10b981 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.4;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .success-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="p-4">
    <div class="neural-bg"></div>

    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-8 md:p-10 animate-slide-up">
        <div class="text-center mb-10">
            <div class="w-16 h-16 ai-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-200 mx-auto mb-6">
                <i class="fas fa-brain text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Join BIZGROW</h1>
            <p class="text-slate-500 font-medium">Start your journey with autonomous intelligence</p>
        </div>

        <form id="signupForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Full Name</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="fullName" required placeholder="John Doe" 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Work Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="email" id="email" required placeholder="john@company.com" 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Create Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full ai-gradient text-white py-4 rounded-2xl font-bold text-lg hover:brightness-110 transition-all shadow-xl shadow-emerald-100 mt-4 flex items-center justify-center gap-2">
                <span>Create Account</span>
                <i class="fas fa-arrow-right text-sm"></i>
            </button>
        </form>

        <p class="text-center mt-8 text-slate-500 text-sm">
            Already have an account? 
            <a href="login_actual.html" class="text-emerald-600 font-bold hover:underline">Log in</a>
        </p>
    </div>

    <!-- Success Message Modal -->
    <div id="successModal" class="success-modal px-4">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 mb-4">Welcome Aboard!</h2>
            <p class="text-slate-600 mb-8 leading-relaxed">
                You have successfully created an account with <span class="font-bold text-emerald-600 italic">BIZGROW</span>.
            </p>
            <button onclick="window.location.href='SERVICES.html'" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-black transition-all">
                Go to Services
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
            authDomain: "bizgrow-a23c0.firebaseapp.com",
            projectId: "bizgrow-a23c0",
            storageBucket: "bizgrow-a23c0.firebasestorage.app",
            messagingSenderId: "939506450920",
            appId: "1:939506450920:web:76e5faf1fc9caf379c245d",
            measurementId: "G-WLZYCP312V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bizgrow-prod';

        const form = document.getElementById("signupForm");
        const submitBtn = document.getElementById("submitBtn");
        const modal = document.getElementById('successModal');

        // Exponential Backoff helper for Rule 2 & 3 stability
        async function withRetry(fn, retries = 5, delay = 1000) {
            try {
                return await fn();
            } catch (err) {
                if (retries <= 0) throw err;
                await new Promise(resolve => setTimeout(resolve, delay));
                return withRetry(fn, retries - 1, delay * 2);
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("fullName").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> Processing Neural Data...';

            try {
                // 1. Create the Auth User
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Save User Data to Firestore using Strict Paths (Rule 1)
                // Format: /artifacts/{appId}/users/{userId}/{collectionName}/{docId}
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                
                await withRetry(() => setDoc(userDocRef, {
                    fullName: name,
                    email: email,
                    createdAt: new Date().toISOString(),
                    uid: user.uid,
                    appId: appId
                }));

                // 3. UI Success
                modal.style.display = 'flex';
                submitBtn.innerHTML = 'Account Ready';

            } catch (err) {
                console.error("Signup Error:", err);
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Retry Setup';
                
                // Show user friendly error (no alerts)
                const errorDisplay = document.createElement('p');
                errorDisplay.className = 'text-red-500 text-xs mt-4 text-center font-bold animate-slide-up';
                errorDisplay.innerText = err.message || 'Signup failed. Please check your credentials.';
                
                const existing = document.querySelector('.text-red-500');
                if (existing) existing.remove();
                form.appendChild(errorDisplay);
                setTimeout(() => errorDisplay.remove(), 5000);
            }
        });
    </script>
</body>
</html>
