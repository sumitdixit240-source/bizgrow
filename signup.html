<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlertaIQ Onboarding</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background-color: #020617;
    background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                      radial-gradient(circle at bottom left, #0f172a, transparent);
    min-height: 100vh;
}

.glass-card {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body class="flex items-center justify-center p-4">

<!-- SUCCESS POPUP -->
<div id="successPopup" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-[999]">
    <div class="bg-slate-900 p-8 rounded-2xl text-center w-[340px] border border-slate-700">

        <div class="text-green-400 text-5xl mb-4">
            <i class="fas fa-circle-check"></i>
        </div>

        <h2 class="text-2xl font-bold text-white">Success!</h2>
        <p class="text-slate-400 mt-2 mb-6">
            Your account is successfully created.
        </p>

        <button onclick="goToLogin()" 
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl">
            Go to Login
        </button>
    </div>
</div>

<!-- FORM -->
<div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl">

<h2 class="text-2xl font-bold text-white mb-6 text-center">Create Account</h2>

<form id="signupForm" class="space-y-4">

<input id="fullName" placeholder="Full Name" class="w-full p-3 rounded-lg bg-slate-900 text-white"><br>

<input id="email" placeholder="Email" class="w-full p-3 rounded-lg bg-slate-900 text-white"><br>

<input id="phone" placeholder="Phone (10 digits)" class="w-full p-3 rounded-lg bg-slate-900 text-white"><br>

<input id="password" type="password" placeholder="Password" class="w-full p-3 rounded-lg bg-slate-900 text-white"><br>

<button id="submitBtn" type="submit"
class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl">
Create Account
</button>

</form>

<p id="msg" class="text-center mt-4 text-sm"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
  authDomain: "bizgrow-a23c0.firebaseapp.com",
  projectId: "bizgrow-a23c0",
  storageBucket: "bizgrow-a23c0.firebasestorage.app",
  messagingSenderId: "939506450920",
  appId: "1:939506450920:web:76e5faf1fc9caf379c245d",
  measurementId: "G-WLZYCP312V"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("signupForm");
const msg = document.getElementById("msg");
const btn = document.getElementById("submitBtn");
const popup = document.getElementById("successPopup");

function showPopup() {
    popup.classList.remove("hidden");
}

window.goToLogin = function () {
    window.location.href = "login.html";
};

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;

    if (phone.length !== 10) {
        msg.innerText = "Enter valid 10-digit phone number";
        msg.style.color = "red";
        return;
    }

    try {
        btn.disabled = true;
        btn.innerText = "Creating...";

        // 1. Create Auth user
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCred.user;

        // 2. Firestore (SAFE STRUCTURE)
        await setDoc(doc(db, "users", user.uid), {
            uid: user.uid,
            name: fullName,
            email: email,
            phone: "+91 " + phone,
            createdAt: new Date().toISOString()
        });

        // 3. SHOW SUCCESS POPUP
        showPopup();

        form.reset();
        btn.disabled = false;
        btn.innerText = "Create Account";

    } catch (error) {
        msg.innerText = error.message;
        msg.style.color = "red";

        btn.disabled = false;
        btn.innerText = "Create Account";
    }
});

</script>

</body>
</html>
