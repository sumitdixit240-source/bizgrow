<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AlertaIQ - AI-Powered Compliance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Animation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-indigo: #6366f1;
            --brand-violet: #8b5cf6;
            --brand-emerald: #10b981;
            --slate-deep: #020617;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--slate-deep);
            color: #f8fafc;
            overflow: hidden;
            touch-action: none;
        }

        /* Abstract Grid Background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }

        .radial-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vh;
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.12) 0%, transparent 60%);
            z-index: -1;
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.2;
        }

        /* AlertaIQ Brand Motion */
        .brand-text {
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .iq-tag {
            background: linear-gradient(135deg, var(--brand-indigo), var(--brand-violet));
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 900;
            color: white;
            margin-left: 4px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            display: inline-block;
        }

        /* Glassmorphism Card */
        .compliance-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* Input Styles */
        .iq-input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .iq-input:focus {
            border-color: var(--brand-indigo);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
            transform: translateY(-2px);
        }

        /* Slide to Unlock Container */
        .slider-container {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            height: 64px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            user-select: none;
            overflow: hidden;
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.2s ease;
        }

        .slider-handle {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--brand-indigo), var(--brand-violet));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 2;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
            transition: background 0.3s ease;
        }

        /* Status Animations */
        #statusOverlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            background: #020617;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .risk-ring {
            animation: rotate 12s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .animate-in { opacity: 0; transform: translateY(20px); }
        
        .nav-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .nav-btn:hover {
            border-color: var(--brand-indigo);
            background: rgba(99, 102, 241, 0.1);
            color: white;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="grid-bg"></div>
    <div class="radial-glow" id="glow"></div>
    <div id="particle-container"></div>

    <!-- Persistent Header Navigation -->
    <div class="fixed top-8 left-0 right-0 z-50 px-8 flex justify-between items-center animate-in">
        <a href="index.html" class="nav-btn flex items-center gap-3 px-5 py-2.5 rounded-full text-slate-400 text-xs font-bold uppercase tracking-widest backdrop-blur-md">
            <i class="fas fa-home"></i>
            <span>System Core</span>
        </a>
        <div class="text-[10px] text-slate-600 font-mono hidden md:block uppercase tracking-widest">
            Encryption: AES-256 Enabled
        </div>
    </div>

    <div class="max-w-md w-full relative z-10" id="mainContainer">
        <!-- Logo Section -->
        <div class="text-center mb-10 animate-in">
            <h1 class="text-4xl brand-text inline-flex items-center">
                Alerta<span class="iq-tag" id="iqTag">IQ</span>
            </h1>
            <p class="text-slate-500 text-sm mt-3 font-medium tracking-wide">
                Secure Enterprise Portal <span class="text-indigo-400">v2.4.0</span>
            </p>
        </div>

        <!-- Portal Card -->
        <div class="compliance-card rounded-[2.5rem] p-10 shadow-2xl animate-in" id="authCard">
            <div class="mb-8 text-center">
                <div id="iconBox" class="w-14 h-14 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-indigo-500/20">
                    <i class="fas fa-fingerprint text-indigo-400 text-xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Identity Access</h2>
                <p class="text-slate-400 text-xs mt-1">Authorized personnel only</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2 group">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1 transition-colors group-focus-within:text-indigo-400">Universal Identifier</label>
                    <div class="relative">
                        <i class="far fa-user-circle absolute left-5 top-1/2 -translate-y-1/2 text-slate-600 transition-colors group-focus-within:text-indigo-400"></i>
                        <input type="email" id="email" required placeholder="name@alertaiq.ai" 
                            class="iq-input w-full rounded-2xl py-4 pl-14 pr-6 outline-none text-white placeholder-slate-700">
                    </div>
                </div>

                <div class="space-y-2 group">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1 transition-colors group-focus-within:text-indigo-400">Passcode</label>
                    <div class="relative">
                        <i class="fas fa-key absolute left-5 top-1/2 -translate-y-1/2 text-slate-600 transition-colors group-focus-within:text-indigo-400"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="iq-input w-full rounded-2xl py-4 pl-14 pr-6 outline-none text-white placeholder-slate-700">
                    </div>
                </div>

                <div id="errorMessage" class="hidden p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-[11px] font-bold flex items-center gap-3">
                    <i class="fas fa-shield-virus"></i>
                    <span id="errorText">Access Denied: Blocked Activity</span>
                </div>

                <!-- Slide to Login Interaction -->
                <div class="pt-2">
                    <div class="slider-container shimmer" id="sliderContainer">
                        <div class="slider-text" id="sliderText">Slide to Authenticate</div>
                        <div class="slider-handle" id="sliderHandle">
                            <i class="fas fa-chevron-right text-white"></i>
                        </div>
                    </div>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center flex flex-col gap-3">
                <a href="#" class="text-slate-500 text-[11px] hover:text-indigo-400 transition-colors">Emergency Key Recovery</a>
                <p class="text-slate-400 text-[11px]">
                    New Entity? 
                    <a href="signup.html" class="text-indigo-400 font-bold ml-1">Create an Account</a>
                </p>
            </div>
        </div>

        <div class="mt-8 flex justify-center gap-8 opacity-20 grayscale animate-in">
            <i class="fas fa-university text-lg"></i>
            <i class="fas fa-vault text-lg"></i>
            <i class="fas fa-microchip text-lg"></i>
        </div>
    </div>

    <!-- AI Initialization Overlay -->
    <div id="statusOverlay">
        <div class="relative w-48 h-48 mb-12" id="statusCircle">
            <div class="absolute inset-0 border-4 border-dashed border-indigo-500/20 rounded-full risk-ring"></div>
            <div class="absolute inset-4 border-2 border-emerald-500/30 rounded-full risk-ring" style="animation-direction: reverse; animation-duration: 15s;"></div>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <span id="riskScore" class="text-5xl font-black text-white">00</span>
                <span class="text-[10px] uppercase tracking-[0.3em] text-emerald-500 font-bold">Risk Score</span>
            </div>
            <svg class="absolute inset-0 -rotate-90" viewBox="0 0 100 100">
                <circle id="progressCircle" cx="50" cy="50" r="48" stroke="url(#gradient)" stroke-width="3" fill="none" stroke-dasharray="301.59" stroke-dashoffset="301.59" stroke-linecap="round" class="transition-all duration-300"/>
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#6366f1" />
                        <stop offset="100%" stop-color="#10b981" />
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <div class="text-center" id="statusInfo">
            <h2 id="statusTitle" class="text-3xl font-black text-white mb-2">Syncing IQ Core</h2>
            <div id="statusTask" class="text-slate-500 font-mono text-[10px] uppercase tracking-widest">Compiling Expiry Nodes...</div>
        </div>
    </div>

    <script type="module">
        // Particle System
        const container = document.getElementById('particle-container');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.left = `${Math.random() * 100}vw`;
            p.style.top = `${Math.random() * 100}vh`;
            container.appendChild(p);
            
            gsap.to(p, {
                y: '-=100',
                x: `+=${Math.random() * 40 - 20}`,
                duration: 5 + Math.random() * 5,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
        }

        // Initial Entry Animations
        gsap.to(".animate-in", {
            opacity: 1,
            y: 0,
            duration: 1,
            stagger: 0.15,
            ease: "expo.out"
        });

        // 3D Tilt Effect on Mouse Move
        const card = document.getElementById('authCard');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            gsap.to(card, {
                rotationY: xAxis,
                rotationX: -yAxis,
                duration: 1,
                ease: "power2.out"
            });
            
            gsap.to("#glow", {
                x: (e.pageX - window.innerWidth / 2) * 0.1,
                y: (e.pageY - window.innerHeight / 2) * 0.1,
                duration: 2,
                ease: "power1.out"
            });
        });

        // Slider Logic
        const handle = document.getElementById('sliderHandle');
        const sliderContainer = document.getElementById('sliderContainer');
        const sliderText = document.getElementById('sliderText');
        
        let isDragging = false;
        let startX = 0;
        let maxTranslate = 0;

        const updateMaxTranslate = () => {
            maxTranslate = sliderContainer.clientWidth - handle.clientWidth - 8;
        };

        const startDrag = (e) => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            
            if(!email || !pass) {
                gsap.fromTo("#errorMessage", { x: -10 }, { x: 0, duration: 0.1, repeat: 5, ease: "linear" });
                document.getElementById("errorMessage").classList.remove("hidden");
                document.getElementById("errorText").innerText = "Credentials Required for Uplink";
                return;
            }

            isDragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            handle.style.transition = 'none';
            updateMaxTranslate();
            
            gsap.to(handle, { scale: 0.95, duration: 0.2 });
        };

        const moveDrag = (e) => {
            if (!isDragging) return;
            const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            let diff = currentX - startX;
            
            if (diff < 0) diff = 0;
            if (diff > maxTranslate) diff = maxTranslate;
            
            handle.style.transform = `translateX(${diff}px)`;
            sliderText.style.opacity = 1 - (diff / maxTranslate);
            
            const progress = diff / maxTranslate;
            handle.style.background = `linear-gradient(135deg, 
                rgb(${99 + (16 * progress)}, ${102 + (83 * progress)}, ${241 - (112 * progress)}), 
                rgb(${139 - (123 * progress)}, ${92 + (93 * progress)}, ${246 - (117 * progress)}))`;
        };

        const endDrag = async () => {
            if (!isDragging) return;
            isDragging = false;
            
            const currentTranslate = parseFloat(handle.style.transform.replace('translateX(', '').replace('px)', '')) || 0;
            
            if (currentTranslate >= maxTranslate - 5) {
                gsap.to(handle, { x: maxTranslate, scale: 1.1, duration: 0.2 });
                handle.innerHTML = '<i class="fas fa-check"></i>';
                initiateLoginSequence();
            } else {
                gsap.to(handle, { x: 0, scale: 1, duration: 0.5, ease: "elastic.out(1, 0.3)" });
                gsap.to(sliderText, { opacity: 1, duration: 0.2 });
            }
        };

        const initiateLoginSequence = async () => {
            const overlay = document.getElementById('statusOverlay');
            const progressCircle = document.getElementById('progressCircle');
            const riskScoreText = document.getElementById('riskScore');
            const statusTask = document.getElementById('statusTask');
            const statusTitle = document.getElementById('statusTitle');

            gsap.to("#mainContainer", { opacity: 0, scale: 0.95, duration: 0.5 });
            
            overlay.style.display = 'flex';
            gsap.to(overlay, { opacity: 1, duration: 0.5 });
            
            const stages = [
                { score: 14, task: "Decrypting Handshake...", title: "Authenticating" },
                { score: 42, task: "Scanning Biometric Delta...", title: "Verification" },
                { score: 68, task: "Validating AI Governance...", title: "Neural Link" },
                { score: 99, task: "Access Granted. Finalizing...", title: "Success" }
            ];

            let currentStage = 0;
            const updateStage = () => {
                if(currentStage >= stages.length) {
                    showFinalSuccess();
                    return;
                };

                const s = stages[currentStage];
                statusTask.innerText = s.task;
                statusTitle.innerText = s.title;

                gsap.to(progressCircle, {
                    strokeDashoffset: 301.59 - (s.score/100 * 301.59),
                    duration: 0.8,
                    ease: "power2.inOut"
                });

                let start = parseInt(riskScoreText.innerText);
                let obj = { val: start };
                gsap.to(obj, {
                    val: s.score,
                    duration: 0.8,
                    onUpdate: () => {
                        riskScoreText.innerText = Math.floor(obj.val).toString().padStart(2, '0');
                    }
                });

                currentStage++;
                setTimeout(updateStage, 1200);
            };

            const showFinalSuccess = () => {
                const overlay = document.getElementById('statusOverlay');
                gsap.to(overlay, {
                    backgroundColor: "#020617ee",
                    duration: 1
                });
                
                overlay.innerHTML = `
                    <div class="text-center animate-in" style="opacity: 1; transform: translateY(0)">
                        <div class="w-24 h-24 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-emerald-500/20 shadow-[0_0_50px_rgba(16,185,129,0.2)]">
                            <i class="fas fa-check-circle text-emerald-500 text-5xl"></i>
                        </div>
                        <h1 class="text-4xl font-black text-white mb-2">SESSION ESTABLISHED</h1>
                        <p class="text-slate-500 font-mono text-[10px] uppercase tracking-[0.3em] mb-12">Neural Identity Linked: 0x92f...a1</p>
                        
                        <div class="flex flex-col gap-4 w-64 mx-auto">
                            <a href="SERVICES.html" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-3">
                                <i class="fas fa-rocket"></i> Launch Dashboard
                            </a>
                            <a href="index.html" class="nav-btn py-4 rounded-2xl text-slate-400 font-bold flex items-center justify-center gap-3">
                                <i class="fas fa-home"></i> Back to Home
                            </a>
                            <div class="pt-4 border-t border-white/5">
                                <p class="text-slate-600 text-[10px] uppercase tracking-widest mb-3">Switch Node?</p>
                                <a href="signup.html" class="text-indigo-400 text-xs font-bold hover:text-indigo-300 transition-colors">Create New Account</a>
                            </div>
                        </div>
                    </div>
                `;
            };

            setTimeout(updateStage, 500);
        };

        // Events
        handle.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', endDrag);

        handle.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', moveDrag);
        window.addEventListener('touchend', endDrag);

        window.addEventListener('resize', updateMaxTranslate);
        updateMaxTranslate();
    </script>
</body>
</html>
