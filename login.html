<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BizGrow Autonomous Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --emerald-glow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            overflow-x: hidden;
            color: #f8fafc;
        }

        /* Video/Animated Background */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.4;
            filter: saturate(1.5) contrast(1.2);
        }

        .neural-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, #020617 100%);
            z-index: -1;
        }

        /* Flying & Flashing Brand Name */
        .brand-container {
            perspective: 1000px;
            animation: flying-entrance 1.5s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        .flashing-brand {
            font-weight: 900;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            display: inline-block;
            background: linear-gradient(90deg, #10b981, #34d399, #6ee7b7, #10b981);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: 
                neural-flash 3s infinite,
                float-motion 4s ease-in-out infinite,
                glimmer 2s linear infinite;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.5));
        }

        @keyframes flying-entrance {
            0% { transform: translateY(-50px) translateZ(-200px) rotateX(20deg); opacity: 0; }
            100% { transform: translateY(0) translateZ(0) rotateX(0); opacity: 1; }
        }

        @keyframes float-motion {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        @keyframes glimmer {
            to { background-position: 300% center; }
        }

        @keyframes neural-flash {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 15px #10b981); }
            50% { opacity: 0.7; filter: drop-shadow(0 0 5px #10b981); }
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Scanner Line Effect */
        .glass-card::after {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, transparent, rgba(16, 185, 129, 0.05), transparent);
            animation: scan 4s infinite linear;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -100%; }
            100% { top: 200%; }
        }

        .ai-gradient {
            background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #statusOverlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(12px);
        }

        input {
            background: rgba(255, 255, 255, 0.03) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.07) !important;
            border-color: #10b981 !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .input-icon {
            transition: all 0.3s ease;
        }

        input:focus + .input-icon {
            color: #10b981;
        }

        /* Enhanced Back Button Styles */
        .back-link {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .back-link:hover .arrow-icon {
            transform: translateX(-6px);
            color: #10b981;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Background Elements -->
    <img class="video-bg" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=2072" alt="Neural Network Background">
    <div class="neural-overlay"></div>

    <div class="max-w-md w-full relative z-10">
        <div class="text-center mb-4 brand-container">
            <h2 class="flashing-brand text-4xl mb-1">BizGrow</h2>
            <div class="flex items-center justify-center gap-2 overflow-hidden">
                <span class="h-[1px] w-8 bg-emerald-500/30"></span>
                <p class="text-emerald-500 font-bold text-[10px] tracking-[0.4em] uppercase opacity-80">Autonomous Intelligence</p>
                <span class="h-[1px] w-8 bg-emerald-500/30"></span>
            </div>
        </div>

        <!-- Enhanced Back Button with Arrow -->
        <div class="mb-6">
            <a href="index.html" class="back-link inline-flex items-center text-[11px] font-black uppercase tracking-widest text-slate-500 hover:text-emerald-400 transition-all group">
                <span class="arrow-icon mr-3 flex items-center justify-center w-8 h-8 rounded-full border border-white/10 group-hover:border-emerald-500/50 transition-all">
                    <i class="fas fa-arrow-left"></i>
                </span>
                Return to Core
            </a>
        </div>

        <div id="loginCard" class="glass-card rounded-[2.5rem] p-10">
            <div class="text-center mb-10">
                <div class="w-16 h-16 ai-gradient rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-6 relative">
                    <div class="absolute inset-0 bg-emerald-400 blur-xl opacity-30 animate-pulse"></div>
                    <i class="fas fa-microchip text-white text-2xl relative z-10"></i>
                </div>
                <h1 class="text-3xl font-black text-white mb-2">System Login</h1>
                <p class="text-slate-400 font-medium text-sm">Synchronizing neural interface...</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-emerald-500 mb-2 ml-1">Access Identity</label>
                    <div class="relative group">
                        <i class="fas fa-at absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 input-icon"></i>
                        <input type="email" id="email" required placeholder="neural-id@bizgrow.ai" 
                            class="w-full rounded-2xl py-4 pl-12 pr-4 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-emerald-500 mb-2 ml-1">Encryption Key</label>
                    <div class="relative group">
                        <i class="fas fa-fingerprint absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 input-icon"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full rounded-2xl py-4 pl-12 pr-4 outline-none transition-all">
                    </div>
                </div>

                <div id="errorMessage" class="hidden p-4 rounded-xl bg-red-950/50 border border-red-500/30 text-red-400 text-xs font-bold flex items-center gap-3">
                    <i class="fas fa-shield-virus"></i>
                    <span id="errorText">Access Denied: Verification Failed</span>
                </div>

                <button type="submit" id="submitBtn" class="w-full ai-gradient text-white py-4 rounded-2xl font-black text-lg shadow-xl hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-bolt"></i>
                    Authenticate Session
                </button>
            </form>

            <div class="mt-8 space-y-4 text-center">
                <p class="text-slate-400 text-sm font-medium">
                    New entity? 
                    <a href="signup.html" class="text-emerald-400 font-bold hover:text-emerald-300 transition-colors">Register Node</a>
                </p>
                
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-white/10"></div>
                    <span class="flex-shrink mx-4 text-slate-600 text-[10px] font-black uppercase tracking-widest">Protocol</span>
                    <div class="flex-grow border-t border-white/10"></div>
                </div>

                <div class="flex gap-3">
                    <button class="flex-1 flex items-center justify-center gap-2 py-3 border border-white/10 text-slate-300 rounded-xl font-bold text-xs hover:bg-white/5 transition-all">
                        <i class="fab fa-google text-emerald-500"></i> Google
                    </button>
                    <button class="flex-1 flex items-center justify-center gap-2 py-3 border border-white/10 text-slate-300 rounded-xl font-bold text-xs hover:bg-white/5 transition-all">
                        <i class="fab fa-github text-emerald-500"></i> GitHub
                    </button>
                </div>
            </div>
        </div>
        
        <p class="text-center mt-8 text-slate-600 text-[10px] uppercase tracking-[0.2em] font-bold">
            &copy; 2024 BizGrow Corp <span class="mx-2">|</span> Secure Quantum Link Enabled
        </p>
    </div>

    <!-- Status Overlay -->
    <div id="statusOverlay">
        <div class="text-center">
            <div id="statusIcon" class="w-24 h-24 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(16,185,129,0.3)]">
                <i class="fas fa-check-double text-4xl"></i>
            </div>
            <h2 id="statusTitle" class="text-4xl font-black text-white mb-2">Authorized</h2>
            <p id="statusDesc" class="text-slate-400 mb-10">Injecting session tokens...</p>
            
            <div class="relative w-24 h-24 mx-auto flex items-center justify-center">
                <svg class="absolute inset-0 -rotate-90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" stroke="rgba(255,255,255,0.05)" stroke-width="6" fill="none"/>
                    <circle id="progressCircle" cx="50" cy="50" r="45" stroke="#10b981" stroke-width="6" fill="none" stroke-dasharray="283" stroke-dashoffset="283" class="transition-all duration-300 ease-out"/>
                </svg>
                <div class="text-center">
                    <span id="timerCount" class="text-2xl font-black text-white block">3</span>
                    <span class="text-[8px] uppercase tracking-tighter text-emerald-500 font-bold">SEC</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
            authDomain: "bizgrow-a23c0.firebaseapp.com",
            projectId: "bizgrow-a23c0",
            storageBucket: "bizgrow-a23c0.firebasestorage.app",
            messagingSenderId: "939506450920",
            appId: "1:939506450920:web:76e5faf1fc9caf379c245d",
            measurementId: "G-WLZYCP312V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById("loginForm");
        const submitBtn = document.getElementById("submitBtn");
        const errorContainer = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        const overlay = document.getElementById("statusOverlay");
        const timerCount = document.getElementById("timerCount");
        const progressCircle = document.getElementById("progressCircle");

        const showStatus = (title, desc) => {
            overlay.style.display = 'flex';
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusDesc').innerText = desc;
        };

        const startTimer = (callback) => {
            let count = 3;
            const total = 3;
            timerCount.innerText = count;
            const interval = setInterval(() => {
                count--;
                timerCount.innerText = Math.max(0, count);
                const progress = ((total - count) / total) * 283;
                progressCircle.style.strokeDashoffset = 283 - progress;
                if (count <= 0) {
                    clearInterval(interval);
                    callback();
                }
            }, 1000);
        };

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            errorContainer.classList.add("hidden");
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> Processing...';

            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const user = cred.user;
                const docSnap = await getDoc(doc(db, "users", user.uid));
                
                let fullName = docSnap.exists() ? docSnap.data().fullName || "Agent" : "Agent";

                localStorage.setItem("user", JSON.stringify({
                    name: fullName,
                    email: user.email,
                    uid: user.uid
                }));

                showStatus("Access Granted", `Welcome back, ${fullName}. Initializing interface...`);
                startTimer(() => {
                    window.location.href = "SERVICES.html";
                });

            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-bolt"></i> Authenticate Session';
                errorContainer.classList.remove("hidden");
                errorText.innerText = "Handshake Failed: Invalid Identity/Key";
            }
        });
    </script>
</body>
</html>
