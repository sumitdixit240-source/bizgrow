<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | BizGrow</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #f8fafc;
}

.neural-bg {
    background-image: radial-gradient(#10b981 0.5px, transparent 0.5px);
    background-size: 32px 32px;
}

.glass-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.5);
}

.ai-gradient {
    background: linear-gradient(135deg,#059669,#10b981,#34d399);
}

.loader {
    border: 3px solid rgba(255,255,255,0.3);
    border-top: 3px solid white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

#statusOverlay {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(255,255,255,0.95);
}
</style>
</head>

<body class="neural-bg min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full glass-card rounded-3xl p-8">

    <h1 class="text-3xl font-bold text-center mb-6">Welcome Back</h1>

    <form id="loginForm" class="space-y-5">

        <input id="email" type="email" placeholder="Email"
        class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">

        <input id="password" type="password" placeholder="Password"
        class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">

        <div id="errorMessage" class="hidden text-red-600 text-sm"></div>

        <button id="submitBtn"
        class="w-full ai-gradient text-white py-3 rounded-xl font-bold">
            Authenticate
        </button>
    </form>

</div>

<div id="statusOverlay">
    <h2 class="text-2xl font-bold">Login Successful 🚀</h2>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

// ✅ Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
    authDomain: "bizgrow-a23c0.firebaseapp.com",
    projectId: "bizgrow-a23c0",
    storageBucket: "bizgrow-a23c0.firebasestorage.app",
    messagingSenderId: "939506450920",
    appId: "1:939506450920:web:76e5faf1fc9caf379c245d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// UI
const form = document.getElementById("loginForm");
const btn = document.getElementById("submitBtn");
const errorBox = document.getElementById("errorMessage");
const overlay = document.getElementById("statusOverlay");

// submit
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        showError("Please fill all fields");
        return;
    }

    errorBox.classList.add("hidden");
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>';

    try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const user = cred.user;

        let name = "User";

        try {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) name = snap.data().fullName || "User";
        } catch {}

        localStorage.setItem("user", JSON.stringify({
            name,
            email: user.email,
            uid: user.uid
        }));

        overlay.style.display = "flex";

        setTimeout(() => {
            window.location.href = "SERVICES.html";
        }, 2000);

    } catch (err) {
        console.error(err.code, err.message);

        btn.disabled = false;
        btn.innerHTML = "Authenticate";

        switch (err.code) {
            case "auth/user-not-found":
                showError("User not found");
                break;
            case "auth/wrong-password":
                showError("Wrong password");
                break;
            case "auth/invalid-email":
                showError("Invalid email");
                break;
            case "auth/invalid-credential":
                showError("Invalid credentials");
                break;
            case "auth/network-request-failed":
                showError("Network error");
                break;
            default:
                showError("Login failed");
        }
    }
});

function showError(msg) {
    errorBox.innerText = msg;
    errorBox.classList.remove("hidden");
}
</script>

</body>
</html>
