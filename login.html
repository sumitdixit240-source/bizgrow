<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BizGrow Autonomous Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
        }

        .neural-bg {
            background-image: radial-gradient(#10b981 0.5px, transparent 0.5px);
            background-size: 32px 32px;
            background-position: 0 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-gradient {
            background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
        }

        .input-focus:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        /* Entry Animation */
        .page-entry {
            animation: zoomIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes zoomIn {
            from { transform: scale(1.1); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Success/Logout Overlay */
        #statusOverlay {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #statusOverlay.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .success-bg-glow {
            filter: blur(60px);
            animation: pulse-glow 3s infinite alternate;
        }

        @keyframes pulse-glow {
            from { opacity: 0.3; transform: scale(1); }
            to { opacity: 0.6; transform: scale(1.2); }
        }

        .modal-blur {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="neural-bg min-h-screen flex items-center justify-center p-4 page-entry">

    <div class="max-w-md w-full relative" id="mainContent">
        <!-- Back Button -->
        <a id="backBtn" href="index.html" class="inline-flex items-center text-sm font-semibold text-slate-500 hover:text-emerald-600 mb-8 transition-colors group">
            <i class="fas fa-arrow-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i>
            Back to Home
        </a>

        <!-- Main Container -->
        <div class="relative">
            <!-- Login Card -->
            <div id="loginCard" class="glass-card rounded-[2.5rem] p-10 relative overflow-hidden z-10">
                <div class="absolute -top-24 -right-24 w-48 h-48 bg-emerald-400/10 rounded-full blur-3xl"></div>
                
                <div class="text-center mb-10">
                    <div class="w-16 h-16 ai-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-200 mx-auto mb-6">
                        <i class="fas fa-brain text-white text-2xl"></i>
                    </div>
                    <h1 class="text-3xl font-black text-slate-900 mb-2">Welcome Back</h1>
                    <p class="text-slate-500 font-medium text-sm">Access your autonomous dashboard</p>
                </div>

                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Enterprise Email</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" id="email" required 
                                class="w-full bg-white/50 border border-slate-200 rounded-2xl py-4 pl-12 pr-4 outline-none transition-all input-focus text-slate-900 font-medium"
                                placeholder="name@company.ai">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Neural Access Key</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" id="password" required 
                                class="w-full bg-white/50 border border-slate-200 rounded-2xl py-4 pl-12 pr-12 outline-none transition-all input-focus text-slate-900 font-medium"
                                placeholder="••••••••">
                            <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-600 transition-colors">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div id="errorMessage" class="hidden p-4 rounded-xl bg-red-50 border border-red-100 text-red-600 text-xs font-bold flex items-center gap-3">
                        <i class="fas fa-circle-exclamation"></i>
                        <span id="errorText">Invalid credentials provided.</span>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full ai-gradient text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-emerald-200 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                        <span>Authenticate</span>
                        <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-tight">
                        Protected by <span class="text-emerald-600">Sentinel Security</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Overlay (Success/Logout) -->
    <div id="statusOverlay">
        <div class="absolute inset-0 bg-white/95 backdrop-blur-2xl"></div>
        <div class="absolute -top-10 -left-10 w-40 h-40 bg-emerald-400/20 rounded-full success-bg-glow"></div>
        
        <div class="relative z-30 text-center px-8">
            <div id="statusIcon" class="w-24 h-24 rounded-full bg-emerald-100 flex items-center justify-center mb-6 mx-auto">
                <i class="fas fa-check-double text-emerald-600 text-4xl animate-bounce"></i>
            </div>
            
            <h2 id="statusTitle" class="text-4xl font-black text-slate-900 mb-2">Access Granted</h2>
            <p id="statusSub" class="text-slate-500 font-medium mb-8">Redirecting to stack...</p>
            
            <div class="relative w-20 h-20 mx-auto flex items-center justify-center">
                <svg class="absolute inset-0 transform -rotate-90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-100"/>
                    <circle id="countdownCircle" cx="50" cy="50" r="45" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="283" stroke-dashoffset="0" class="text-emerald-500 transition-all duration-1000 linear"/>
                </svg>
                <span id="timerText" class="text-3xl font-black text-slate-900">3</span>
            </div>
        </div>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 modal-blur">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl animate-slide-up text-center">
            <div class="w-20 h-20 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-sign-out-alt text-3xl"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-900 mb-2">Secure Logout</h3>
            <p class="text-slate-500 font-medium mb-8">Are you sure you want to terminate your session?</p>
            <div class="flex gap-4">
                <button onclick="closeLogoutModal()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all">Cancel</button>
                <button onclick="confirmLogout()" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold hover:bg-red-700 transition-all shadow-lg shadow-red-100">Yes, Logout</button>
            </div>
        </div>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Elements
        const loginForm = document.getElementById('loginForm');
        const loginCard = document.getElementById('loginCard');
        const submitBtn = document.getElementById('submitBtn');
        const statusOverlay = document.getElementById('statusOverlay');
        const countdownCircle = document.getElementById('countdownCircle');
        const timerText = document.getElementById('timerText');
        const logoutModal = document.getElementById('logoutModal');

        // Check login status on load
        onAuthStateChanged(auth, (user) => {
            if (user && window.location.pathname.includes('login.html')) {
                // User is signed in, show success and move to service
                handleLoginSuccess(user);
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="loader"></span>`;
            document.getElementById('errorMessage').classList.add('hidden');

            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                handleLoginSuccess(cred.user);
            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Authenticate</span> <i class="fas fa-chevron-right text-xs"></i>`;
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorText').innerText = error.message.replace('Firebase:', '');
            }
        });

        function handleLoginSuccess(user) {
            statusOverlay.classList.add('active');
            startCountdown(() => {
                window.location.href = 'SERVICES.html';
            });
        }

        function startCountdown(onComplete) {
            let timeLeft = 3;
            const fullDash = 283;
            timerText.innerText = timeLeft;
            
            const timer = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;
                const offset = fullDash - (timeLeft / 3) * fullDash;
                countdownCircle.style.strokeDashoffset = offset;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    onComplete();
                }
            }, 1000);
        }

        window.togglePassword = function() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        };

        // Global functions for modal control
        window.closeLogoutModal = () => logoutModal.classList.add('hidden');
        window.triggerLogout = () => logoutModal.classList.remove('hidden');
        window.confirmLogout = async () => {
            logoutModal.classList.add('hidden');
            document.getElementById('statusTitle').innerText = "Logging Out";
            document.getElementById('statusSub').innerText = "Securing neural workspace...";
            document.getElementById('statusIcon').innerHTML = '<i class="fas fa-shield-alt text-amber-500 text-4xl animate-pulse"></i>';
            statusOverlay.classList.add('active');
            
            await signOut(auth);
            startCountdown(() => {
                window.location.href = 'index.html';
            });
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token).catch(() => {});
            }
        };
        initAuth();
    </script>
</body>
</html>
