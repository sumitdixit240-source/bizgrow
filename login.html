<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BizGrow Autonomous Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        .neural-bg {
            background-image: radial-gradient(#10b981 0.5px, transparent 0.5px);
            background-size: 32px 32px;
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .ai-gradient {
            background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #statusOverlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .modal-bg {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="neural-bg min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <a href="index.html" class="inline-flex items-center text-sm font-semibold text-slate-500 hover:text-emerald-600 mb-8 transition-colors group">
            <i class="fas fa-arrow-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i>
            Back to Home
        </a>

        <div id="loginCard" class="glass-card rounded-[2.5rem] p-10 relative overflow-hidden">
            <div class="text-center mb-10">
                <div class="w-16 h-16 ai-gradient rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-6">
                    <i class="fas fa-brain text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-900 mb-2">Welcome Back</h1>
                <p class="text-slate-500 font-medium text-sm">Verify your neural credentials</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="email" id="email" required placeholder="name@company.com" 
                            class="w-full bg-white border border-slate-200 rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full bg-white border border-slate-200 rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                    </div>
                </div>

                <div id="errorMessage" class="hidden p-4 rounded-xl bg-red-50 text-red-600 text-xs font-bold flex items-center gap-3">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">Error message here</span>
                </div>

                <button type="submit" id="submitBtn" class="w-full ai-gradient text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-emerald-100 hover:brightness-105 active:scale-95 transition-all">
                    Authenticate
                </button>
            </form>

            <div class="mt-8 space-y-4 text-center">
                <p class="text-slate-500 text-sm font-medium">
                    New to the ecosystem? 
                    <a href="signup.html" class="text-emerald-600 font-bold hover:underline">Create an account</a>
                </p>
                
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="flex-shrink mx-4 text-slate-300 text-[10px] font-black uppercase tracking-widest">Or</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>

                <a href="signup.html" class="w-full flex items-center justify-center gap-2 py-3.5 border-2 border-slate-100 text-slate-600 rounded-2xl font-bold text-sm hover:bg-emerald-50 hover:border-emerald-100 hover:text-emerald-700 transition-all group">
                    <i class="fas fa-user-plus text-xs opacity-50 group-hover:opacity-100"></i>
                    Become a Member
                </a>
            </div>
        </div>
    </div>

    <!-- Status Overlay for Login/Logout Timers -->
    <div id="statusOverlay">
        <div class="text-center">
            <div id="statusIcon" class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check text-3xl"></i>
            </div>
            <h2 id="statusTitle" class="text-3xl font-black text-slate-900 mb-2">Success</h2>
            <p id="statusDesc" class="text-slate-500 mb-8">Redirecting to dashboard...</p>
            <div class="relative w-16 h-16 mx-auto flex items-center justify-center">
                <svg class="absolute inset-0 -rotate-90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" stroke="#f1f5f9" stroke-width="8" fill="none"/>
                    <circle id="progressCircle" cx="50" cy="50" r="45" stroke="#10b981" stroke-width="8" fill="none" stroke-dasharray="283" stroke-dashoffset="0" class="transition-all duration-1000 linear"/>
                </svg>
                <span id="timerCount" class="text-2xl font-black">3</span>
            </div>
        </div>
    </div>

    <!-- Logout Confirm Modal -->
    <div id="logoutModal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 modal-bg">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-sign-out-alt text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Confirm Logout</h3>
            <p class="text-slate-500 mb-8">Are you sure you want to exit your session?</p>
            <div class="flex gap-4">
                <button onclick="toggleLogoutModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold">No</button>
                <button id="confirmLogoutBtn" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold">Yes, Logout</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5wDZ1ujGnCgOXyYLVH9Y02KuLxgWbnUA",
            authDomain: "bizgrow-a23c0.firebaseapp.com",
            projectId: "bizgrow-a23c0",
            storageBucket: "bizgrow-a23c0.firebasestorage.app",
            messagingSenderId: "939506450920",
            appId: "1:939506450920:web:76e5faf1fc9caf379c245d",
            measurementId: "G-WLZYCP312V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const overlay = document.getElementById('statusOverlay');
        const timerCount = document.getElementById('timerCount');
        const progressCircle = document.getElementById('progressCircle');

        // Login Logic
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> Authenticating...';

            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const user = cred.user;

                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                let userData = {
                    name: user.displayName || "User",
                    email: user.email,
                    uid: user.uid
                };

                if (userSnap.exists()) {
                    userData.name = userSnap.data().fullName || userData.name;
                }

                localStorage.setItem("user", JSON.stringify(userData));
                
                showStatus("Access Granted", "Redirecting to workspace...", "success");
                startTimer(() => window.location.href = "SERVICES.html");

            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = "Authenticate";
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorText').innerText = error.code.split('/')[1].replace(/-/g, ' ');
            }
        });

        // Global Timer Helper
        function startTimer(callback) {
            let count = 3;
            timerCount.innerText = count;
            const interval = setInterval(() => {
                count--;
                timerCount.innerText = count;
                const offset = 283 - (count / 3) * 283;
                progressCircle.style.strokeDashoffset = offset;
                
                if (count <= 0) {
                    clearInterval(interval);
                    callback();
                }
            }, 1000);
        }

        function showStatus(title, desc, type) {
            overlay.style.display = 'flex';
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusDesc').innerText = desc;
            const icon = document.getElementById('statusIcon');
            if(type === 'logout') {
                icon.className = "w-20 h-20 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-6";
                icon.innerHTML = '<i class="fas fa-sign-out-alt text-3xl"></i>';
                progressCircle.style.stroke = "#f59e0b";
            }
        }

        // Logout Logic
        window.toggleLogoutModal = (show) => {
            document.getElementById('logoutModal').style.display = show ? 'flex' : 'none';
        };

        document.getElementById('confirmLogoutBtn').addEventListener('click', async () => {
            toggleLogoutModal(false);
            showStatus("Logging Out", "Terminating secure session...", "logout");
            await signOut(auth);
            localStorage.removeItem("user");
            startTimer(() => window.location.href = "index.html");
        });
    </script>
</body>
</html>
