<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlertaIQ | Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --brand-indigo: #6366f1;
            --brand-violet: #8b5cf6;
            --slate-deep: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--slate-deep);
            color: #f8fafc;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Dynamic Background */
        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(2, 6, 23, 0.8) 100%);
            pointer-events: none;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .iq-tag {
            background: linear-gradient(135deg, var(--brand-indigo), var(--brand-violet));
            padding: 2px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.75rem;
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        /* Input Styling */
        input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--brand-indigo);
            background: rgba(255, 255, 255, 0.06);
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Auth Button Styling */
        .auth-button {
            position: relative;
            background: linear-gradient(135deg, var(--brand-indigo), var(--brand-violet));
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            overflow: hidden;
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.5);
        }

        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.6);
            filter: brightness(1.1);
        }

        .auth-button:active {
            transform: translateY(0);
        }

        .auth-button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .hidden-view {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            display: none !important;
        }

        .pulse-loader {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Success State */
        #successScreen {
            z-index: 100;
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.15) 0%, #020617 100%);
        }

        .error-link {
            text-decoration: underline;
            cursor: pointer;
            color: #818cf8;
        }
    </style>
</head>
<body>
    <!-- CANVAS BACKGROUND -->
    <canvas id="bgCanvas"></canvas>
    <div class="bg-overlay"></div>

    <!-- TOP NAVIGATION -->
    <nav class="fixed top-0 left-0 w-full p-6 z-[100]">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-lg bg-indigo-500/10 flex items-center justify-center border border-indigo-500/20 group-hover:bg-indigo-500/20 transition-all">
                    <i class="fas fa-home text-indigo-400 text-xs"></i>
                </div>
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400 group-hover:text-white transition-colors">Home</span>
            </a>

            <a href="signup.html" class="flex items-center gap-2 group bg-white/5 hover:bg-white/10 px-5 py-2.5 rounded-full border border-white/10 transition-all">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-300 group-hover:text-white">Create Account</span>
                <i class="fas fa-user-plus text-indigo-400 text-xs"></i>
            </a>
        </div>
    </nav>

    <!-- MAIN LOGIN CARD -->
    <div id="authScreen" class="max-w-md w-full glass p-10 rounded-[2.5rem] relative">
        <div class="text-center mb-10">
            <div class="inline-block mb-6">
                <span class="text-3xl font-black tracking-tighter text-white">Alerta<span class="iq-tag ml-1">IQ</span></span>
            </div>
            <h2 class="text-xl font-bold text-white mb-2">Secure Gateway Access</h2>
            <p class="text-slate-500 text-xs font-medium uppercase tracking-widest">Never Miss What Matters</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest ml-1">Account Identity</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                    <input type="email" id="email" placeholder="admin@alertaiq.io" class="w-full p-4 pl-12 rounded-2xl text-white text-sm">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest ml-1">Access Token</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                    <input type="password" id="password" placeholder="••••••••" class="w-full p-4 pl-12 rounded-2xl text-white text-sm">
                </div>
            </div>

            <div class="pt-6">
                <button id="authButton" class="w-full auth-button text-white">
                    <span id="btnText">Sign In to Gateway</span>
                    <i id="btnIcon" class="fas fa-arrow-right ml-3 text-xs opacity-70"></i>
                </button>
            </div>

            <div class="text-center pt-4 min-h-[40px]" id="errorContainer">
                <!-- Errors will appear here -->
            </div>
        </div>
    </div>

    <!-- LOADING / VERIFYING STATE -->
    <div id="loadingScreen" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-950 z-50 hidden-view">
        <div class="relative w-48 h-48 mb-10">
            <div class="absolute inset-0 border-2 border-dashed border-indigo-500/20 rounded-full animate-[spin_20s_linear_infinite]"></div>
            <div class="absolute inset-4 border border-indigo-500/10 rounded-full animate-[spin_10s_linear_infinite_reverse]"></div>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <i class="fas fa-fingerprint text-indigo-500 text-4xl pulse-loader"></i>
                <div class="mt-4 mono text-white font-bold text-xl" id="loadPercent">00%</div>
            </div>
        </div>
        <h3 class="text-lg font-bold text-white mb-2" id="loadMsg">Initializing Neural Handshake</h3>
        <p class="text-slate-500 mono text-[10px] uppercase tracking-[0.3em]">Protocol: Alerta-Auth-v4.0</p>
    </div>

    <!-- SUCCESS CELEBRATION -->
    <div id="successScreen" class="fixed inset-0 flex flex-col items-center justify-center hidden-view">
        <div class="w-24 h-24 bg-indigo-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_50px_rgba(99,102,241,0.5)]">
            <i class="fas fa-check text-white text-4xl"></i>
        </div>
        <h2 class="text-3xl font-black text-white mb-2">Welcome Back</h2>
        <p class="text-slate-400 font-medium uppercase tracking-[0.2em] text-xs">Identity Verified. Access Granted.</p>
    </div>

    <!-- FIREBASE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Config from environment
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- BACKGROUND ANIMATION ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        const maxPoints = 60;
        const maxDistance = 180;
        let mouse = { x: null, y: null };

        function initBackground() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            points = [];
            for (let i = 0; i < maxPoints; i++) {
                points.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 2 + 1
                });
            }
        }

        function animateBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < points.length; i++) {
                let p = points[i];
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(99, 102, 241, 0.4)';
                ctx.fill();
                if(mouse.x) {
                    let dx = p.x - mouse.x;
                    let dy = p.y - mouse.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if(dist < 200) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 * (1 - dist/200)})`;
                        ctx.stroke();
                    }
                }
                for (let j = i + 1; j < points.length; j++) {
                    let p2 = points[j];
                    let dx = p.x - p2.x; let dy = p.y - p2.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < maxDistance) {
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(99, 102, 241, ${0.2 * (1 - dist / maxDistance)})`;
                        ctx.lineWidth = 0.5; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateBackground);
        }

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('resize', initBackground);
        initBackground();
        animateBackground();

        // --- AUTH LOGIC ---
        const authButton = document.getElementById('authButton');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const authScreen = document.getElementById('authScreen');
        const loadingScreen = document.getElementById('loadingScreen');
        const successScreen = document.getElementById('successScreen');
        const loadPercent = document.getElementById('loadPercent');
        const loadMsg = document.getElementById('loadMsg');
        const errorContainer = document.getElementById('errorContainer');

        authButton.addEventListener('click', attemptLogin);

        async function attemptLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError("Please enter valid credentials");
                return;
            }

            // Set Loading UI
            authButton.classList.add('loading');
            btnText.innerText = "Authenticating...";
            btnIcon.className = "fas fa-circle-notch fa-spin ml-3 text-xs";

            try {
                // Perform Firebase Auth check
                await signInWithEmailAndPassword(auth, email, password);
                
                // If successful, proceed to celebratory flow
                startVerificationFlow();
            } catch (error) {
                // Specific error handling for "user not found"
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    showError(`Account not found. <a href="signup.html" class="error-link">Please create an account</a>`);
                } else {
                    showError(error.message);
                }
                resetButton();
            }
        }

        function resetButton() {
            authButton.classList.remove('loading');
            btnText.innerText = "Sign In to Gateway";
            btnIcon.className = "fas fa-arrow-right ml-3 text-xs opacity-70";
        }

        function showError(msg) {
            errorContainer.innerHTML = `<span class="text-[10px] font-bold text-red-400 uppercase tracking-widest leading-relaxed">${msg}</span>`;
            gsap.fromTo(errorContainer, { x: -10 }, { x: 0, duration: 0.1, repeat: 5, yoyo: true });
        }

        function startVerificationFlow() {
            gsap.to(authScreen, { 
                opacity: 0, scale: 0.9, duration: 0.5, ease: "power2.in",
                onComplete: () => {
                    authScreen.classList.add('hidden-view');
                    loadingScreen.classList.remove('hidden-view');
                    loadingScreen.style.display = 'flex';
                    gsap.to(loadingScreen, { opacity: 1, duration: 0.5 });
                    runLoader();
                }
            });
        }

        function runLoader() {
            let progress = { val: 0 };
            const messages = ["Neural Handshake", "Synchronizing Profile", "Accessing Gateway", "Success"];
            gsap.to(progress, {
                val: 100, duration: 2.5, ease: "none",
                onUpdate: () => {
                    const p = Math.floor(progress.val);
                    loadPercent.innerText = `${p.toString().padStart(2, '0')}%`;
                    loadMsg.innerText = messages[Math.floor(p/26)] || messages[3];
                },
                onComplete: () => {
                    showCelebration();
                }
            });
        }

        function showCelebration() {
            gsap.to(loadingScreen, { 
                opacity: 0, 
                duration: 0.4, 
                onComplete: () => {
                    loadingScreen.classList.add('hidden-view');
                    successScreen.classList.remove('hidden-view');
                    successScreen.style.display = 'flex';
                    gsap.fromTo(successScreen, { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.6 });

                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#6366f1', '#a855f7', '#ffffff']
                    });

                    // Redirect to SERVICES.html after the welcome message/celebration
                    setTimeout(() => {
                        window.location.href = 'SERVICES.html';
                    }, 2500);
                } 
            });
        }
    </script>
</body>
</html>
